<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;
  --surface:#141414;
  --elevated:#1A1A1A;
  --text:#F5F5F5;
  --text2:#8A8A8A;
  --muted:#555;
  --accent:#C41E2A;
  --accent-glow:rgba(196,30,42,0.15);
  --accent-dim:rgba(196,30,42,0.08);
  --border:#222;
  --border-light:#2a2a2a;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --radius:12px;
}
html{scroll-behavior:smooth}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  padding-bottom:90px;
  padding-top:env(safe-area-inset-top);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}

/* ── Header ── */
.header{text-align:center;padding:36px 20px 24px}
.header .wordmark{font-family:'Great Vibes',cursive;font-size:52px;color:var(--accent);line-height:1.1;margin-bottom:4px}
.header .wordmark-sub{font-size:13px;letter-spacing:4px;text-transform:uppercase;color:var(--text);font-weight:300;margin-bottom:4px;opacity:0.7}
.header .subtitle{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text2);margin-bottom:14px}
.header .contact{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);text-decoration:none;border:1px solid var(--border);border-radius:20px;padding:6px 14px;transition:border-color .2s}
.header .contact:hover{border-color:var(--accent)}
.header .contact svg{width:14px;height:14px;fill:var(--accent)}

/* ── Search ── */
.search-wrap{max-width:480px;margin:0 auto 8px;padding:0 16px}
.search-input{
  width:100%;padding:10px 14px 10px 38px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text);font-size:14px;font-family:var(--font);outline:none;
  transition:border-color .2s;
}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:28px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:var(--muted);pointer-events:none}

/* ── Accordion Menu ── */
.menu{max-width:480px;margin:0 auto;padding:8px 16px}

.accordion{margin-bottom:6px;border-radius:var(--radius);overflow:hidden;background:var(--surface);border:1px solid var(--border)}
.accordion-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;cursor:pointer;user-select:none;
  transition:background .15s;
}
.accordion-header:hover{background:var(--elevated)}
.accordion-header:active{background:var(--border)}
.accordion-title{
  font-size:13px;font-weight:600;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--text);
}
.accordion-meta{display:flex;align-items:center;gap:10px}
.accordion-count{
  font-size:11px;color:var(--accent);
  background:var(--accent-dim);
  padding:2px 8px;border-radius:10px;
  font-weight:600;
}
.accordion-chevron{
  width:20px;height:20px;fill:var(--text2);
  transition:transform .25s ease;flex-shrink:0;
}
.accordion.open .accordion-chevron{transform:rotate(180deg)}

.accordion-body{
  max-height:0;overflow:hidden;
  transition:max-height .3s ease;
}
.accordion.open .accordion-body{max-height:none}
.accordion-body-inner{padding:0 18px 12px}

/* ── Item Rows ── */
.item{padding:12px 0;border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none}
.item-main{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.item-info{flex:1;min-width:0}
.item-name{font-size:14.5px;font-weight:500;color:var(--text)}
.item-desc{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.4}
.item-serving{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.item-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.item-price{font-size:14px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums;white-space:nowrap}

/* ── Add Button ── */
.add-btn{
  width:30px;height:30px;border-radius:50%;border:1.5px solid var(--accent);
  background:transparent;color:var(--accent);font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;line-height:1;
}
.add-btn:hover{background:var(--accent);color:#fff}
.add-btn:active{transform:scale(0.9)}

/* ── Qty Controls (replaces + when in cart) ── */
.qty-ctrl{display:flex;align-items:center;gap:0;flex-shrink:0}
.qty-btn{
  width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border-light);
  background:var(--elevated);color:var(--text);font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;line-height:1;
}
.qty-btn:hover{border-color:var(--accent);color:var(--accent)}
.qty-btn:active{transform:scale(0.9)}
.qty-val{width:28px;text-align:center;font-size:13px;font-weight:600;color:var(--text)}

/* ── Variant rows ── */
.variant{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 0 6px 12px;border-left:1px solid var(--border);margin-top:6px;gap:8px;
}
.variant-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.variant-right{display:flex;align-items:center;gap:10px}
.variant-price{font-size:13px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums}

/* ── Bottom Bar ── */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--surface);border-top:1px solid var(--border);
  padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  display:flex;align-items:center;gap:12px;
  max-width:100%;
}
.cart-toggle{
  flex:1;display:flex;align-items:center;justify-content:space-between;
  background:var(--elevated);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 14px;cursor:pointer;min-width:0;
}
.cart-toggle-left{display:flex;align-items:center;gap:8px}
.cart-badge{
  background:var(--accent);color:#fff;font-size:11px;font-weight:700;
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.cart-label{font-size:13px;color:var(--text2);white-space:nowrap}
.cart-total{font-size:14px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums}
.pay-btn{
  background:var(--accent);color:#fff;border:none;border-radius:var(--radius);
  padding:12px 20px;font-family:var(--font);font-size:12px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;white-space:nowrap;
  box-shadow:0 4px 16px rgba(196,30,42,0.3);transition:transform .1s,box-shadow .1s;
}
.pay-btn:active{transform:scale(0.96);box-shadow:0 2px 8px rgba(196,30,42,0.2)}
.bottom-bar.empty .cart-toggle{opacity:0.5;pointer-events:none}
.bottom-bar.empty .pay-btn{opacity:0.4;pointer-events:none}

/* ── Cart Drawer ── */
.cart-overlay{
  position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.6);
  display:none;opacity:0;transition:opacity .2s;
}
.cart-overlay.open{display:block;opacity:1}
.cart-drawer{
  position:fixed;bottom:0;left:0;right:0;z-index:301;
  background:var(--surface);border-top-left-radius:20px;border-top-right-radius:20px;
  max-height:70vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s ease;
}
.cart-drawer.open{transform:translateY(0)}
.cart-drawer-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.cart-drawer-title{font-size:15px;font-weight:600;color:var(--text)}
.cart-clear{
  font-size:12px;color:var(--accent);background:none;border:none;
  cursor:pointer;font-family:var(--font);padding:4px 8px;
}
.cart-drawer-body{overflow-y:auto;padding:8px 20px 20px;flex:1}
.cart-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border);gap:10px;
}
.cart-item:last-child{border-bottom:none}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:13.5px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cart-item-variant{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.cart-item-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.cart-item-total{font-size:13px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums;min-width:40px;text-align:right}
.cart-empty-msg{text-align:center;padding:32px 0;color:var(--muted);font-size:13px}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.85);display:none;opacity:0;transition:opacity .25s ease}
.modal-overlay.open{display:flex;opacity:1;align-items:stretch;justify-content:center}
.modal-close{position:absolute;top:12px;right:16px;z-index:1001;background:var(--elevated);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.modal-close:hover{background:var(--border)}
.modal-iframe{width:100%;height:100%;border:none;margin-top:56px}

/* ── No results ── */
.no-results{display:none;text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
.no-results.show{display:block}

/* ── Desktop ── */
@media(min-width:481px){
  body{padding-bottom:100px}
  .menu{padding:8px 24px}
  .bottom-bar{justify-content:center}
  .bottom-bar>*{max-width:440px}
}
</style>
</head>

/* ═══ CART STATE ═══ */
var openAccordions={};
var cart=[];
function cartKey(name,variant){return name+'|'+(variant||'')}
function findCart(name,variant){var k=cartKey(name,variant);return cart.find(function(c){return c.key===k})}
function addToCart(name,price,variant){
  var c=findCart(name,variant);
  if(c){c.qty++}else{cart.push({key:cartKey(name,variant),name:name,variant:variant||'',price:price,qty:1})}
  updateUI();
}
function removeFromCart(name,variant){
  var c=findCart(name,variant);
  if(c){c.qty--;if(c.qty<=0)cart=cart.filter(function(x){return x!==c})}
  updateUI();
}
function getQty(name,variant){var c=findCart(name,variant);return c?c.qty:0}
function cartCount(){return cart.reduce(function(s,c){return s+c.qty},0)}
function cartTotal(){return cart.reduce(function(s,c){return s+c.qty*c.price},0)}
function clearCart(){cart=[];updateUI()}
function fmt(n){return n.toLocaleString('en-US')}

/* ═══ RENDER MENU ═══ */
var container=document.getElementById('menuContainer');

function renderMenu(filter){
  container.innerHTML='';
  var anyVisible=false;
  MENU.forEach(function(cat,ci){
    var filtered=cat.items;
    if(filter){
      var q=filter.toLowerCase();
      filtered=cat.items.filter(function(it){
        return it.n.toLowerCase().indexOf(q)!==-1||(it.d&&it.d.toLowerCase().indexOf(q)!==-1)||(it.s&&it.s.toLowerCase().indexOf(q)!==-1);
      });
    }
    if(filtered.length===0)return;
    anyVisible=true;
    var acc=document.createElement('div');
    acc.className='accordion'+((filter||openAccordions[cat.cat])?' open':'');
    acc.innerHTML='<div class="accordion-header"><span class="accordion-title">'+esc(cat.cat)+'</span><div class="accordion-meta"><span class="accordion-count">'+filtered.length+' item'+(filtered.length!==1?'s':'')+'</span><svg class="accordion-chevron" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div></div>';
    var body=document.createElement('div');
    body.className='accordion-body';
    var inner=document.createElement('div');
    inner.className='accordion-body-inner';

    filtered.forEach(function(it,ii){
      var itemEl=document.createElement('div');
      itemEl.className='item';
      if(it.v){
        // Multi-variant item
        var h='<div class="item-info"><span class="item-name">'+esc(it.n)+'</span>';
        if(it.d)h+='<div class="item-desc">'+esc(it.d)+'</div>';
        h+='</div>';
        itemEl.innerHTML='<div class="item-main">'+h+'</div>';
        it.v.forEach(function(vr){
          var vEl=document.createElement('div');
          vEl.className='variant';
          var qty=getQty(it.n,vr.l);
          vEl.innerHTML='<span class="variant-label">'+esc(vr.l)+'</span><div class="variant-right"><span class="variant-price">'+fmt(vr.p)+'</span>'+(qty>0?qtyHtml(it.n,vr.l,qty):addBtnHtml(it.n,vr.p,vr.l))+'</div>';
          itemEl.appendChild(vEl);
        });
      } else {
        // Simple item
        var qty=getQty(it.n,'');
        var h='<div class="item-main"><div class="item-info"><span class="item-name">'+esc(it.n)+'</span>';
        if(it.d)h+='<div class="item-desc">'+esc(it.d)+'</div>';
        if(it.s)h+='<div class="item-serving">'+esc(it.s)+'</div>';
        h+='</div><div class="item-right"><span class="item-price">'+fmt(it.p)+'</span>'+(qty>0?qtyHtml(it.n,'',qty):addBtnHtml(it.n,it.p,''))+'</div></div>';
        itemEl.innerHTML=h;
      }
      inner.appendChild(itemEl);
    });

    body.appendChild(inner);
    acc.appendChild(body);
    container.appendChild(acc);

    // Accordion toggle
    (function(a,name){
      a.querySelector('.accordion-header').addEventListener('click',function(){
        a.classList.toggle('open');
        openAccordions[name]=a.classList.contains('open');
      });
    })(acc,cat.cat);
  });
  document.getElementById('noResults').className='no-results'+(anyVisible?'':' show');
}

function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function addBtnHtml(name,price,variant){return '<button class="add-btn" data-name="'+esc(name)+'" data-price="'+price+'" data-variant="'+esc(variant||'')+'">+</button>'}
function qtyHtml(name,variant,qty){return '<div class="qty-ctrl"><button class="qty-btn qty-minus" data-name="'+esc(name)+'" data-variant="'+esc(variant||'')+'">−</button><span class="qty-val">'+qty+'</span><button class="qty-btn qty-plus" data-name="'+esc(name)+'" data-variant="'+esc(variant||'')+'">+</button></div>'}

/* ═══ EVENT DELEGATION ═══ */
document.addEventListener('click',function(e){
  var t=e.target;
  if(t.classList.contains('add-btn')){
    addToCart(t.dataset.name,parseInt(t.dataset.price),t.dataset.variant);
  }else if(t.classList.contains('qty-plus')){
    addToCart(t.dataset.name,0,t.dataset.variant);
  }else if(t.classList.contains('qty-minus')){
    removeFromCart(t.dataset.name,t.dataset.variant);
  }
});

/* ═══ UPDATE UI ═══ */
function updateUI(){
  var count=cartCount(),total=cartTotal();
  document.getElementById('cartBadge').textContent=count;
  document.getElementById('cartTotalBottom').textContent=fmt(total)+' LE';
  document.getElementById('bottomBar').className='bottom-bar'+(count===0?' empty':'');
  renderMenu(document.getElementById('searchInput').value);
  renderCartDrawer();
}

/* ═══ CART DRAWER ═══ */
function renderCartDrawer(){
  var body=document.getElementById('cartDrawerBody');
  if(cart.length===0){body.innerHTML='<div class="cart-empty-msg">Your order is empty.</div>';return}
  var h='';
  cart.forEach(function(c){
    h+='<div class="cart-item"><div class="cart-item-info"><div class="cart-item-name">'+esc(c.name)+'</div>';
    if(c.variant)h+='<div class="cart-item-variant">'+esc(c.variant)+'</div>';
    h+='</div><div class="cart-item-right"><div class="qty-ctrl"><button class="qty-btn qty-minus" data-name="'+esc(c.name)+'" data-variant="'+esc(c.variant)+'">−</button><span class="qty-val">'+c.qty+'</span><button class="qty-btn qty-plus" data-name="'+esc(c.name)+'" data-variant="'+esc(c.variant)+'">+</button></div><span class="cart-item-total">'+fmt(c.qty*c.price)+'</span></div></div>';
  });
  body.innerHTML=h;
}

// Cart drawer toggle
var cartDrawer=document.getElementById('cartDrawer');
var cartOverlay=document.getElementById('cartOverlay');
document.getElementById('cartToggle').addEventListener('click',function(){
  cartDrawer.classList.add('open');cartOverlay.classList.add('open');renderCartDrawer();
});
function closeDrawer(){cartDrawer.classList.remove('open');cartOverlay.classList.remove('open')}
cartOverlay.addEventListener('click',closeDrawer);
document.getElementById('cartClear').addEventListener('click',function(){clearCart();closeDrawer()});

/* ═══ SEARCH ═══ */
document.getElementById('searchInput').addEventListener('input',function(){renderMenu(this.value)});

/* ═══ FLOT CHECKOUT ═══ */
var modal=document.getElementById('modal');
var frame=document.getElementById('modalFrame');
var scrollPos=0;
document.getElementById('payBtn').addEventListener('click',function(){
  if(cartCount()===0)return;
  closeDrawer();
  scrollPos=window.scrollY;
  frame.src='https://pay.flotme.ai/lagoonda';
  modal.classList.add('open');
  document.body.style.overflow='hidden';
});
function closeModal(){modal.classList.remove('open');frame.src='';document.body.style.overflow='';window.scrollTo(0,scrollPos)}
document.getElementById('modalClose').addEventListener('click',closeModal);
modal.addEventListener('click',function(e){if(e.target===modal)closeModal()});

/* ═══ INIT ═══ */
renderMenu('');
})();
</script>
