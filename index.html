<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;
  --surface:#131313;
  --elevated:#1A1A1A;
  --card:#111111;
  --text:#F5F5F5;
  --text2:#8A8A8A;
  --muted:#555;
  --accent:#C41E2A;
  --accent-glow:rgba(196,30,42,0.15);
  --accent-dim:rgba(196,30,42,0.06);
  --border:#1e1e1e;
  --border-light:#2a2a2a;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --radius:16px;
  --radius-sm:12px;
}
html{scroll-behavior:smooth}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  line-height:1.5;-webkit-font-smoothing:antialiased;
  padding-bottom:80px;
  padding-top:env(safe-area-inset-top);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
  overflow-x:hidden;
}

/* ── Header ── */
.header{text-align:center;padding:32px 20px 20px}
.header .wordmark{font-family:'Great Vibes',cursive;font-size:52px;color:var(--accent);line-height:1.1;margin-bottom:2px}
.header .wordmark-sub{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--text);font-weight:300;opacity:0.65;margin-bottom:2px}
.header .subtitle{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text2);margin-bottom:14px}
.header .contact{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);text-decoration:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;transition:border-color .2s}
.header .contact:hover{border-color:var(--accent)}
.header .contact svg{width:13px;height:13px;fill:var(--accent)}

/* ── Search ── */
.search-wrap{max-width:500px;margin:0 auto 16px;padding:0 16px;position:relative}
.search-input{width:100%;padding:11px 14px 11px 40px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}
.search-wrap svg{position:absolute;left:28px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:var(--muted);pointer-events:none}

/* ── Category Grid ── */
.grid{
  max-width:500px;margin:0 auto;padding:0 16px;
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
}
.card{
  border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform .15s,border-color .2s;
  display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;
  min-height:140px;padding:0;
  background-size:cover;background-position:center;background-repeat:no-repeat;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.82) 0%,rgba(0,0,0,0.35) 50%,rgba(0,0,0,0.15) 100%);
  transition:background .2s;
}
.card:hover{border-color:var(--border-light);transform:scale(1.01)}
.card:hover::before{background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,rgba(0,0,0,0.25) 50%,rgba(0,0,0,0.08) 100%)}
.card:active{transform:scale(0.97)}
.card-content{position:relative;z-index:1;padding:14px 14px 12px;width:100%}
.card-name{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#fff;line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,0.5)}
.card-count{font-size:10.5px;color:var(--accent);font-weight:600;margin-top:2px}
.card-badge{
  position:absolute;top:10px;right:10px;z-index:2;
  background:var(--accent);color:#fff;font-size:10px;font-weight:700;
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  display:none;box-shadow:0 2px 8px rgba(0,0,0,0.4);
}
.card-badge.show{display:flex}

/* ── Floating Cart FAB (visible when sheet is open) ── */
.cart-fab{
  position:fixed;bottom:20px;right:16px;z-index:302;
  display:none;align-items:center;gap:8px;
  background:var(--accent);color:#fff;
  border:none;border-radius:50px;
  padding:12px 18px;
  font-family:var(--font);font-size:13px;font-weight:700;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(196,30,42,0.45),0 2px 8px rgba(0,0,0,0.3);
  transition:transform .15s,box-shadow .15s;
}
.cart-fab.show{display:flex}
.cart-fab:active{transform:scale(0.94);box-shadow:0 2px 10px rgba(196,30,42,0.3)}
.cart-fab svg{width:20px;height:20px;fill:#fff}
.cart-fab-badge{
  background:#fff;color:var(--accent);
  font-size:11px;font-weight:800;
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.cart-fab-total{font-size:12px;font-weight:600;letter-spacing:0.5px}
.cart-fab.empty{opacity:0.5;pointer-events:none}

/* ── Category Sheet (slides up from bottom) ── */
.sheet-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.55);display:none;opacity:0;transition:opacity .2s}
.sheet-overlay.open{display:block;opacity:1}
.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:301;
  background:var(--surface);
  border-top-left-radius:24px;border-top-right-radius:24px;
  max-height:85vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,.35,1.02);
}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border-light);margin:10px auto 0}
.sheet-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sheet-title{font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text)}
.sheet-back{
  display:flex;align-items:center;gap:6px;
  background:none;border:none;color:var(--text2);
  font-family:var(--font);font-size:13px;
  cursor:pointer;padding:6px 10px 6px 4px;margin-left:-4px;
  border-radius:8px;transition:background .15s,color .15s;
}
.sheet-back:hover{background:var(--elevated);color:var(--text)}
.sheet-back:active{background:var(--border)}
.sheet-back svg{width:20px;height:20px;fill:currentColor}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 20px 24px;flex:1}

/* ── Item Rows inside sheet ── */
.item{padding:13px 0;border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none}
.item-main{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.item-info{flex:1;min-width:0}
.item-name{font-size:14.5px;font-weight:500;color:var(--text)}
.item-desc{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.4}
.item-serving{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.item-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.item-price{font-size:14px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums;white-space:nowrap}

/* ── Add / Qty buttons ── */
.add-btn{
  width:30px;height:30px;border-radius:50%;border:1.5px solid var(--accent);
  background:transparent;color:var(--accent);font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;line-height:1;
}
.add-btn:hover{background:var(--accent);color:#fff}
.add-btn:active{transform:scale(0.9)}
.qty-ctrl{display:flex;align-items:center;gap:0;flex-shrink:0}
.qty-btn{
  width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border-light);
  background:var(--elevated);color:var(--text);font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;line-height:1;
}
.qty-btn:hover{border-color:var(--accent);color:var(--accent)}
.qty-btn:active{transform:scale(0.9)}
.qty-val{width:28px;text-align:center;font-size:13px;font-weight:600;color:var(--text)}

/* ── Variant rows ── */
.variant{display:flex;align-items:center;justify-content:space-between;padding:6px 0 6px 12px;border-left:1px solid var(--border);margin-top:6px;gap:8px}
.variant-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.variant-right{display:flex;align-items:center;gap:10px}
.variant-price{font-size:13px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums}

/* ── Bottom Bar ── */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--surface);border-top:1px solid var(--border);
  padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  display:flex;align-items:center;gap:10px;
}
.cart-toggle{
  flex:1;display:flex;align-items:center;justify-content:space-between;
  background:var(--elevated);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 14px;cursor:pointer;min-width:0;
}
.cart-toggle-left{display:flex;align-items:center;gap:8px}
.cart-badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cart-label{font-size:13px;color:var(--text2);white-space:nowrap}
.cart-total{font-size:14px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums}
.pay-btn{
  background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);
  padding:12px 20px;font-family:var(--font);font-size:12px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;white-space:nowrap;
  box-shadow:0 4px 16px rgba(196,30,42,0.3);transition:transform .1s,box-shadow .1s;
}
.pay-btn:active{transform:scale(0.96);box-shadow:0 2px 8px rgba(196,30,42,0.2)}
.bottom-bar.empty .cart-toggle{opacity:0.5;pointer-events:none}

/* ── Cart Drawer ── */
.cart-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.6);display:none;opacity:0;transition:opacity .2s}
.cart-overlay.open{display:block;opacity:1}
.cart-drawer{
  position:fixed;bottom:0;left:0;right:0;z-index:401;
  background:var(--surface);border-top-left-radius:24px;border-top-right-radius:24px;
  max-height:70vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,.35,1.02);
}
.cart-drawer.open{transform:translateY(0)}
.cart-drawer-handle{width:36px;height:4px;border-radius:2px;background:var(--border-light);margin:10px auto 0}
.cart-drawer-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.cart-drawer-title{font-size:15px;font-weight:600;color:var(--text)}
.cart-clear{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:var(--font);padding:4px 8px}
.cart-drawer-body{overflow-y:auto;padding:8px 20px 20px;flex:1}
.cart-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:10px}
.cart-item:last-child{border-bottom:none}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:13.5px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cart-item-variant{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.cart-item-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.cart-item-total{font-size:13px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums;min-width:40px;text-align:right}
.cart-empty-msg{text-align:center;padding:32px 0;color:var(--muted);font-size:13px}
.cart-footer{border-top:1px solid var(--border);margin-top:12px;padding-top:14px}
.cart-footer-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cart-footer-label{font-size:15px;font-weight:600;color:var(--text)}
.cart-footer-total{font-size:18px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.cart-checkout-btn{
  width:100%;padding:14px;border:none;border-radius:var(--radius-sm);
  background:var(--accent);color:#fff;font-family:var(--font);
  font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;box-shadow:0 4px 16px rgba(196,30,42,0.3);
  transition:transform .1s,box-shadow .1s;
}
.cart-checkout-btn:active{transform:scale(0.97);box-shadow:0 2px 8px rgba(196,30,42,0.2)}

/* ── Checkout Modal ── */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.85);display:none;opacity:0;transition:opacity .25s ease}
.modal-overlay.open{display:flex;opacity:1;align-items:stretch;justify-content:center}
.modal-close{position:absolute;top:12px;right:16px;z-index:1001;background:var(--elevated);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--border)}
.modal-iframe{width:100%;height:100%;border:none;margin-top:56px}

/* ── Footer ── */
.footer{text-align:center;padding:24px 16px 12px;font-size:11px;color:var(--muted)}
.footer a{color:var(--text2);text-decoration:none;transition:color .2s}
.footer a:hover{color:var(--accent)}

/* ── No results ── */
.no-results{display:none;text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
.no-results.show{display:block}

/* ── Desktop ── */
@media(min-width:500px){
  .grid{grid-template-columns:repeat(3,1fr);max-width:600px}
  .bottom-bar{justify-content:center}
  .bottom-bar>*{max-width:440px}
}
@media(min-width:768px){
  .grid{grid-template-columns:repeat(4,1fr);max-width:740px}
}
</style>

/* ═══ CART ═══ */
var cart=[];
function ck(n,v){return n+'|'+(v||'')}
function fc(n,v){var k=ck(n,v);return cart.find(function(c){return c.key===k})}
function addToCart(n,p,v){var c=fc(n,v);if(c)c.qty++;else cart.push({key:ck(n,v),name:n,variant:v||'',price:p,qty:1});updateAll()}
function rmFromCart(n,v){var c=fc(n,v);if(c){c.qty--;if(c.qty<=0)cart=cart.filter(function(x){return x!==c})}updateAll()}
function getQty(n,v){var c=fc(n,v);return c?c.qty:0}
function catQty(cat){var t=0;cat.items.forEach(function(it){if(it.v)it.v.forEach(function(vr){t+=getQty(it.n,vr.l)});else t+=getQty(it.n,'')});return t}
function cartCount(){return cart.reduce(function(s,c){return s+c.qty},0)}
function cartTotal(){return cart.reduce(function(s,c){return s+c.qty*c.price},0)}
function clearCart(){cart=[];updateAll()}
function fmt(n){return n.toLocaleString('en-US')}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* ═══ RENDER GRID ═══ */
var grid=document.getElementById('grid');
var currentSheet=null;

function matchesQuery(q,it,catName){
  return catName.toLowerCase().indexOf(q)!==-1||it.n.toLowerCase().indexOf(q)!==-1||(it.d&&it.d.toLowerCase().indexOf(q)!==-1)||(it.s&&it.s.toLowerCase().indexOf(q)!==-1);
}
function renderGrid(filter){
  grid.innerHTML='';
  var any=false;
  MENU.forEach(function(cat,ci){
    var filtered=cat.items;
    if(filter){
      var q=filter.toLowerCase();
      filtered=cat.items.filter(function(it){return matchesQuery(q,it,cat.cat)});
    }
    if(filtered.length===0)return;
    any=true;
    var cq=catQty(cat);
    var card=document.createElement('div');
    card.className='card';
    card.style.backgroundImage='url('+cat.img+')';
    card.innerHTML='<div class="card-content"><span class="card-name">'+esc(cat.cat)+'</span><span class="card-count">'+filtered.length+' item'+(filtered.length!==1?'s':'')+'</span></div><div class="card-badge'+(cq>0?' show':'')+'">'+cq+'</div>';
    card.addEventListener('click',function(){openSheet(ci,filter)});
    grid.appendChild(card);
  });
  document.getElementById('noResults').className='no-results'+(any?'':' show');
}

/* ═══ SHEET ═══ */
var sheet=document.getElementById('sheet');
var sheetOverlay=document.getElementById('sheetOverlay');
var sheetBody=document.getElementById('sheetBody');
var sheetTitle=document.getElementById('sheetTitle');

function openSheet(ci,filter){
  var cat=MENU[ci];
  currentSheet=ci;
  var items=cat.items;
  if(filter){var q=filter.toLowerCase();items=items.filter(function(it){return matchesQuery(q,it,cat.cat)})}
  sheetTitle.textContent=cat.cat;
  renderSheetItems(items);
  sheet.classList.add('open');
  sheetOverlay.classList.add('open');
  document.body.style.overflow='hidden';
  updateFab();
}

function renderSheetItems(items){
  sheetBody.innerHTML='';
  items.forEach(function(it){
    var el=document.createElement('div');
    el.className='item';
    if(it.v){
      var h='<div class="item-main"><div class="item-info"><span class="item-name">'+esc(it.n)+'</span>';
      if(it.d)h+='<div class="item-desc">'+esc(it.d)+'</div>';
      h+='</div></div>';
      el.innerHTML=h;
      it.v.forEach(function(vr){
        var ve=document.createElement('div');ve.className='variant';
        var q=getQty(it.n,vr.l);
        ve.innerHTML='<span class="variant-label">'+esc(vr.l)+'</span><div class="variant-right"><span class="variant-price">'+fmt(vr.p)+'</span>'+(q>0?qh(it.n,vr.l,q):ab(it.n,vr.p,vr.l))+'</div>';
        el.appendChild(ve);
      });
    }else{
      var q=getQty(it.n,'');
      el.innerHTML='<div class="item-main"><div class="item-info"><span class="item-name">'+esc(it.n)+'</span>'+(it.d?'<div class="item-desc">'+esc(it.d)+'</div>':'')+(it.s?'<div class="item-serving">'+esc(it.s)+'</div>':'')+'</div><div class="item-right"><span class="item-price">'+fmt(it.p)+'</span>'+(q>0?qh(it.n,'',q):ab(it.n,it.p,''))+'</div></div>';
    }
    sheetBody.appendChild(el);
  });
}

function ab(n,p,v){return '<button class="add-btn" data-n="'+esc(n)+'" data-p="'+p+'" data-v="'+esc(v||'')+'">+</button>'}
function qh(n,v,q){return '<div class="qty-ctrl"><button class="qty-btn qty-minus" data-n="'+esc(n)+'" data-v="'+esc(v||'')+'">−</button><span class="qty-val">'+q+'</span><button class="qty-btn qty-plus" data-n="'+esc(n)+'" data-v="'+esc(v||'')+'">+</button></div>'}

function closeSheet(){
  sheet.classList.remove('open');sheetOverlay.classList.remove('open');
  document.body.style.overflow='';currentSheet=null;
  document.getElementById('cartFab').classList.remove('show');
}
document.getElementById('sheetClose').addEventListener('click',closeSheet);
sheetOverlay.addEventListener('click',closeSheet);

/* ═══ EVENT DELEGATION ═══ */
document.addEventListener('click',function(e){
  var t=e.target;
  if(t.classList.contains('add-btn')){addToCart(t.dataset.n,parseInt(t.dataset.p),t.dataset.v)}
  else if(t.classList.contains('qty-plus')){addToCart(t.dataset.n,0,t.dataset.v)}
  else if(t.classList.contains('qty-minus')){rmFromCart(t.dataset.n,t.dataset.v)}
});

/* ═══ FAB ═══ */
var cartFab=document.getElementById('cartFab');
function updateFab(){
  var count=cartCount(),total=cartTotal();
  document.getElementById('cartFabBadge').textContent=count;
  document.getElementById('cartFabTotal').textContent=fmt(total)+' LE';
  cartFab.className='cart-fab'+(currentSheet!==null?' show':'')+(count===0?' empty':'');
}
cartFab.addEventListener('click',function(){
  if(cartCount()>0){
    cartDrawer.classList.add('open');cartOv.classList.add('open');renderCartDrawer();
  }
});

/* ═══ UPDATE ALL ═══ */
function updateAll(){
  var count=cartCount(),total=cartTotal();
  document.getElementById('cartBadge').textContent=count;
  document.getElementById('cartTotalBottom').textContent=fmt(total)+' LE';
  document.getElementById('bottomBar').className='bottom-bar'+(count===0?' empty':'');
  updateFab();
  renderGrid(document.getElementById('searchInput').value);
  // Re-render sheet if open
  if(currentSheet!==null){
    var cat=MENU[currentSheet];var filter=document.getElementById('searchInput').value;
    var items=cat.items;
    if(filter){var q=filter.toLowerCase();items=items.filter(function(it){return matchesQuery(q,it,cat.cat)})}
    renderSheetItems(items);
  }
  renderCartDrawer();
}

/* ═══ CART DRAWER ═══ */
var cartDrawer=document.getElementById('cartDrawer');
var cartOv=document.getElementById('cartOverlay');
function renderCartDrawer(){
  var b=document.getElementById('cartDrawerBody');
  if(!cart.length){b.innerHTML='<div class="cart-empty-msg">Your order is empty.</div>';return}
  var h='';cart.forEach(function(c){
    h+='<div class="cart-item"><div class="cart-item-info"><div class="cart-item-name">'+esc(c.name)+'</div>'+(c.variant?'<div class="cart-item-variant">'+esc(c.variant)+'</div>':'')+'</div><div class="cart-item-right"><div class="qty-ctrl"><button class="qty-btn qty-minus" data-n="'+esc(c.name)+'" data-v="'+esc(c.variant)+'">−</button><span class="qty-val">'+c.qty+'</span><button class="qty-btn qty-plus" data-n="'+esc(c.name)+'" data-v="'+esc(c.variant)+'">+</button></div><span class="cart-item-total">'+fmt(c.qty*c.price)+'</span></div></div>';
  });
  h+='<div class="cart-footer"><div class="cart-footer-row"><span class="cart-footer-label">Total</span><span class="cart-footer-total">'+fmt(cartTotal())+' LE</span></div><button class="cart-checkout-btn" id="cartCheckoutBtn">Proceed to Checkout</button></div>';
  b.innerHTML=h;
  document.getElementById('cartCheckoutBtn').addEventListener('click',function(){
    closeDrawer();closeSheet();
    sp=window.scrollY;frame.src='https://pay.flotme.ai/scarletlounge?amount='+cartTotal();
    modal.classList.add('open');document.body.style.overflow='hidden';
  });
}
document.getElementById('cartToggle').addEventListener('click',function(){closeSheet();cartDrawer.classList.add('open');cartOv.classList.add('open');renderCartDrawer()});
function closeDrawer(){
  cartDrawer.classList.remove('open');cartOv.classList.remove('open');
  if(currentSheet!==null){document.body.style.overflow='hidden'}
}
cartOv.addEventListener('click',closeDrawer);
document.getElementById('cartClear').addEventListener('click',function(){clearCart();closeDrawer()});

/* ═══ SEARCH ═══ */
document.getElementById('searchInput').addEventListener('input',function(){
  closeSheet();renderGrid(this.value);
});

/* ═══ FLOT CHECKOUT ═══ */
var modal=document.getElementById('modal'),frame=document.getElementById('modalFrame'),sp=0;
document.getElementById('payBtn').addEventListener('click',function(){
  closeSheet();closeDrawer();
  sp=window.scrollY;frame.src='https://pay.flotme.ai/scarletlounge?amount='+cartTotal();
  modal.classList.add('open');document.body.style.overflow='hidden';
});
function closeModal(){modal.classList.remove('open');frame.src='';document.body.style.overflow='';window.scrollTo(0,sp)}
document.getElementById('modalClose').addEventListener('click',closeModal);
modal.addEventListener('click',function(e){if(e.target===modal)closeModal()});

/* ═══ INIT ═══ */
renderGrid('');

/* Then swap to the Flot dashboard CMS menu if available (inline data is the fallback). */
(function(){
  var API='https://dashboard.flotme.ai/api/public/menu/ca3abf78-bec4-4be6-b81c-8594d6c3c3c5';
  function adapt(d){
    return (d.sections||[]).map(function(s){
      return { cat:s.title, img:s.image||'', items:(s.items||[]).map(function(i){
        var it={n:i.name};
        if(i.description)it.d=i.description;
        if(i.subHeader)it.s=i.subHeader;
        if(i.variants&&i.variants.length)it.v=i.variants.map(function(v){return {l:v.label,p:v.price};});
        else it.p=i.price;
        return it;
      })};
    });
  }
  function applyBranding(b){
    if(!b)return;
    if(b.subtitle){ var st=document.getElementById('brandSubtitle'); if(st)st.textContent=b.subtitle; }
    if(b.phone){ var ph=document.getElementById('contactPhone'); var cl=document.getElementById('contactLink'); if(ph)ph.textContent=b.phone; if(cl)cl.href='tel:'+b.phone.replace(/\s/g,''); }
  }
  fetch(API).then(function(r){return r.ok?r.json():null;}).then(function(d){
    if(!d)return;
    applyBranding(d.branding);
    if(d.sections&&d.sections.length){
      try{ var a=adapt(d); if(a.length){ MENU=a; var q=document.getElementById('searchInput'); renderGrid(q?q.value:''); } }catch(e){}
    }
  }).catch(function(){});
})();
})();
